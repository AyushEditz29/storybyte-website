async function loadAdminDashboard() {
    const snap = await getDocs(collection(db, "dramas"));
    const container = document.getElementById("adminList");
    container.innerHTML = "";

    snap.forEach(doc => {
        const d = doc.data();
        container.innerHTML += `
            <div class="admin-item">
                <img src="${d.poster}" width="50">
                <span>${d.title}</span>
                <button onclick="deleteDrama('${doc.id}')">Delete</button>
            </div>
        `;
    });
}
