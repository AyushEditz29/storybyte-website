<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Drama | StoryByte</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">

</head>

<body>

<section class="drama-hero">

<nav class="overlay-nav">

<div class="logo">
<img src="images/storybyte-logo.png.png" alt="StoryByte">
</div>

<a href="download.html">
<button class="app-btn">Download App</button>
</a>

</nav>

<div class="drama-overlay">

<h1 id="dramaTitle">Loading...</h1>

<div class="drama-meta">
<span id="viewCount">Loading views...</span>
</div>

</div>

</section>

<section class="player-section">

<div class="player-section">

<video
id="player"
controls
playsinline> </video>

</div>

</section>

<section class="video-actions">

<button class="action-btn">⬇ Download</button>

<button class="action-btn">❤️ Favorite</button>

<button
class="action-btn"
onclick="window.location.href='index.html'">

🔗 Back Home

</button>

</section>

<section class="story-box">

<h2>Story</h2>

<p id="dramaStory">
Loading description...
</p>

</section>

<section class="section">

<h2>Related Dramas</h2>

<div
class="cards"
id="relatedCards">
</div>

</section>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script type="module" src="js/player.js"></script>

</body>
</html>
