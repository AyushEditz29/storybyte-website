<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>StoryByte Player</title>

<link rel="stylesheet"
href="css/style.css">


</head>

<body>

<nav>

<div class="logo">

<img
src="images/storybyte-logo.png.png"
alt="StoryByte">

</div>

<a href="index.html">

<button class="app-btn">

Home

</button>

</a>

</nav>


<section class="player-section">

<h1>

 <div class="video-wrapper">

<div id="watchGate">

<button id="watchBtn"

class="app-btn">

▶ Continue Watching

</button>

</div>

<div id="playerBox"

style="display:none;">

<iframe

id="streamtapeFrame"

width="100%"

height="500"

allowfullscreen

frameborder="0">

</iframe>

</div>

</div>
    
</section>


<section class="video-actions">

<button class="action-btn">

⬇ Download

</button>

<button class="action-btn">

❤️ Favorite

</button>

<button class="action-btn">

🔗 Share

</button>

</section>


<section class="story-box">

<h2>

Story

</h2>

<p>

A revenge drama where power, betrayal and destiny collide together.

</p>

</section>


<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script src="js/player.js"></script>

<script>

const watchBtn=

document.getElementById("watchBtn");

const playerBox=

document.getElementById("playerBox");

const frame=

document.getElementById("streamtapeFrame");


// Temporary test URL

const streamtapeUrl=

"https://streamtape.com/e/XXXXXXXX";


watchBtn.onclick=()=>{

// Yahan baad me Monetag aayega


frame.src=streamtapeUrl;

playerBox.style.display="block";

watchBtn.style.display="none";

};

</script>

</body>

</html>
