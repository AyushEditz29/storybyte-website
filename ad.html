<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Reward Content...</title>
    
    <!-- 🌟 REAL AD INJECTION: Bina naya tab khole isi page par premium overlay ad dikhane ke liye -->
    <script>(function(s){s.dataset.zone='11213927',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .ad-player-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .ad-top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .timer-badge {
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .close-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            cursor: not-allowed;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            opacity: 0.6;
        }
        .close-btn.active {
            background: #ff4757;
            border-color: #ff4757;
            cursor: pointer;
            opacity: 1;
            box-shadow: 0 0 10px #ff4757;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff4757;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="ad-player-container">
        <!-- Top Controls Layout -->
        <div class="ad-top-bar">
            <div id="rewardStatus" class="timer-badge">Streaming Ad: <span id="countdown">15</span>s</div>
            <button id="closeAdBtn" class="close-btn" disabled>×</button>
        </div>

        <div class="loader"></div>
        <h2>Playing Rewarded Video Ad...</h2>
        <p style="color: #aaa; font-size: 14px;">Do not close this page. Your reward is being generated.</p>
    </div>

    <script>
        // Maine ad time 15 seconds kar diya hai taaki real video look aaye
        let timeLeft = 15; 
        const countdownEl = document.getElementById("countdown");
        const statusEl = document.getElementById("rewardStatus");
        const closeBtn = document.getElementById("closeAdBtn");
        
        const params = new URLSearchParams(window.location.search);
        const nextTarget = params.get("next");

        // Page load hote hi bina kisi click ke automatic loop timer shuru
        const adTimer = setInterval(() => {
            timeLeft--;
            if (countdownEl) countdownEl.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(adTimer);
                
                // Reward Status changes to Granted
                statusEl.innerHTML = "✓ Reward granted";
                statusEl.style.background = "#4CAF50";
                statusEl.style.borderColor = "#4CAF50";
                
                // Active the cross close switch
                closeBtn.disabled = false;
                closeBtn.classList.add("active");
            }
        }, 1000);

        closeBtn.onclick = () => {
            if (!closeBtn.classList.contains("active")) return;
            if (nextTarget) {
                // User direct usi tab mein bina naye page par bhatke apne video par chala jayega
                window.location.href = decodeURIComponent(nextTarget);
            }
        };
    </script>

</body>
</html>
