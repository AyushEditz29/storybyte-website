<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Preparing Your Content...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050505;

color:#fff;

font-family:Arial,sans-serif;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

.container{

width:90%;

max-width:420px;

background:#111;

padding:35px;

border-radius:20px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,.5);

}

.logo{

width:120px;

margin-bottom:20px;

}

.loader{

width:65px;

height:65px;

border:5px solid #222;

border-top:5px solid #ff3d57;

border-radius:50%;

margin:auto;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

h2{

margin-top:20px;

font-size:24px;

}

p{

margin-top:10px;

color:#aaa;

font-size:14px;

line-height:1.6;

}

.progress{

width:100%;

height:10px;

background:#222;

border-radius:30px;

overflow:hidden;

margin-top:25px;

}

.progress-bar{

height:100%;

width:0%;

background:#ff3d57;

transition:.3s;

}

.timer{

margin-top:18px;

font-size:18px;

font-weight:bold;

color:#ff3d57;

}

</style>

</head>

<body>

<div class="container">

<img src="images/storybyte-logo.png.png" class="logo">

<div class="loader"></div>

<h2>Preparing Secure Stream...</h2>

<p>

Please wait while we verify your access.

</p>

<div class="progress">

<div class="progress-bar" id="bar"></div>

</div>

<div class="timer">

Redirecting in

<span id="count">

10

</span>

s

</div>

</div>

<script>

// Social Bar background me load hogi
window.addEventListener("load", () => {

    setTimeout(() => {

        const s = document.createElement("script");

        s.src = "https://pl30322150.effectivecpmnetwork.com/ac/1b/ae/ac1bae48f45f6c7ec1f7a9588835e87c.js";

        s.async = true;

        document.body.appendChild(s);

    }, 500);

});

const params = new URLSearchParams(window.location.search);
const next = params.get("next");

let sec = 10;

const count = document.getElementById("count");
const bar = document.getElementById("bar");

const timer = setInterval(() => {

    sec--;

    count.innerText = sec;

    bar.style.width = ((10 - sec) * 10) + "%";

    if (sec <= 0) {

        clearInterval(timer);

        if (next) {
            window.location.href = decodeURIComponent(next);
        }

    }

}, 1000);

</script>

</body>

</html>
