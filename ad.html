<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Reward Content...</title>
    
    <!-- Plyr Engine CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            padding: 10px;
        }
        .ad-player-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 65vh; /* Video container ki height thodi kam ki taaki niche space bache */
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .ad-top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .timer-badge {
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .close-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            cursor: not-allowed;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            opacity: 0.6;
        }
        .close-btn.active {
            background: #ff4757;
            border-color: #ff4757;
            cursor: pointer;
            opacity: 1;
            box-shadow: 0 0 10px #ff4757;
        }
        #vastVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }
        /* 🌟 BANNER CONTAINER FIX: Jo download ad aa raha tha wo ab poora screen par dikhega */
        .banner-holder {
            width: 100%;
            max-width: 400px;
            height: 30vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            background: #121212;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="ad-player-container">
        <!-- Top Controls Layout -->
        <div class="ad-top-bar">
            <div id="rewardStatus" class="timer-badge">Streaming Ad: <span id="countdown">15</span>s</div>
            <button id="closeAdBtn" class="close-btn" disabled>×</button>
        </div>

        <!-- Real VAST Player -->
        <video id="vastVideo" playsinline autoplay muted></video>
    </div>

    <!-- Niche banner ad box -->
    <div class="banner-holder">
        <script>
        (function(nti){
        var d = document,
            s = d.createElement('script'),
            l = d.scripts[d.scripts.length - 1];
        s.settings = nti || {};
        s.src = "\/\/prizefamily.com\/bZXXV\/sUd.GhlA0CY\/W-cb\/ee\/mr9-uiZ\/UflfkUPPTncfxmOiDpgGz\/MUjUEvtKNvz\/Ej4NOuDQMOyxNHQv";
        s.async = true;
        s.referrerPolicy = 'no-referrer-when-downgrade';
        l.parentNode.insertBefore(s, l);
        })({})
        </script>
    </div>

    <!-- Scripts For Engine Components -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    
    <script>
        let timeLeft = 15; 
        const countdownEl = document.getElementById("countdown");
        const statusEl = document.getElementById("rewardStatus");
        const closeBtn = document.getElementById("closeAdBtn");
        const videoEl = document.getElementById("vastVideo");
        
        const params = new URLSearchParams(window.location.search);
        const nextTarget = params.get("next");

        // HilltopAds VAST 3.0 Video Link Injection
        videoEl.src = "https://nautical-hand.com/d.m/FUzXdtGxNqvMZMGNUR/geUmT9AunZ_UilRk/PjTlcnxCOJDfgPzaM/TBM/tjNrzPE/4WO/DiMexDNQwa";

        // Initialize Player without controls to lock the user
        const player = new Plyr('#vastVideo', {
            controls: [],
            clickToPlay: false,
            keyboard: { global: false, focused: false }
        });

        // Loop Counter Logic
        const adTimer = setInterval(() => {
            timeLeft--;
            if (countdownEl) countdownEl.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(adTimer);
                
                statusEl.innerHTML = "✓ Reward granted";
                statusEl.style.background = "#4CAF50";
                statusEl.style.borderColor = "#4CAF50";
                
                closeBtn.disabled = false;
                closeBtn.classList.add("active");
            }
        }, 1000);

        closeBtn.onclick = () => {
            if (!closeBtn.classList.contains("active")) return;
            if (nextTarget) {
                window.location.href = decodeURIComponent(nextTarget);
            }
        };
    </script>

</body>
</html>
