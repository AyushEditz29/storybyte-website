<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>StoryByte Admin</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginBox" class="admin-box">

<h1>Admin Login</h1>

<input

id="email"

type="email"

placeholder="Email"

>

<input

id="password"

type="password"

placeholder="Password"

>

<button id="loginBtn">

Login

</button>

</div>

<!-- UPLOAD PANEL -->

<div id="uploadPanel" class="admin-box">

<h1>📹 Upload Video</h1>

<input
type="file"
id="videoFile"
accept="video/mp4">

<button id="uploadBtn">

Upload To Streamtape

</button>

<div id="uploadStatus">

</div>

<button
id="nextBtn">

Next →

</button>

</div>

<!-- ADMIN PANEL -->

<div
id="adminPanel"
class="admin-box">

<h1>🎬 Publish Drama</h1>

<h1>StoryByte Admin</h1>

<input

id="title"

placeholder="Drama Name">

<select id="category">

<option value="Romance">

❤️ Romance

</option>

<option value="Horror">

👻 Horror

</option>

<option value="Action">

💥 Action

</option>

<option value="Comedy">

😀 Comedy

</option>

<option value="Thriller">

🔪 Thriller

</option>

<option value="Drama">

👑 Drama

</option>

<option value="Mystery">

🕵️ Mystery

</option>

<option value="Fantasy">

✨ Fantasy

</option>

</select>

<input

id="poster"

placeholder="Poster URL">

<input

id="banner"

placeholder="Banner URL">

<textarea

id="description"

placeholder="Description">

</textarea>

<label>

<input

type="checkbox"

id="showBanner">

Add To Banner

<input
id="video"
placeholder="Video URL"
readonly>

</label>

<button id="publishBtn">

Publish Drama

</button>

</div>

<script

type="module"

src="js/admin.js">

</script>

</body>

</html>
