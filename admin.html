<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StoryByte Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div id="loginBox" class="panel">
        <h1>Admin Login</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>

    <div id="uploadPanel" class="panel" style="display:none;">
        <h1>Telegram Video Link</h1>
        <input type="text" id="telegramFileId" placeholder="Telegram File ID">
        <button id="saveLinkBtn">Save Link</button>
        <div id="uploadStatus"></div>
        <button id="nextBtn">Next (Publish Page)</button>
    </div>

    <div id="adminPanel" class="panel" style="display:none;">
        <h1>Publish Drama</h1>
        <input type="text" id="finalVideoUrl" placeholder="Telegram File ID (Auto-filled)" readonly>
        <input type="text" id="title" placeholder="Drama Title">
        
        <select id="category">
            <option value="Romance">❤️ Romance</option>
            <option value="Revenge">😈 Revenge</option>
            <option value="Horror">👻 Horror</option>
            <option value="Action">💥 Action</option>
            <option value="Comedy">😀 Comedy</option>
            <option value="Thriller">🔪 Thriller</option>
            <option value="Drama">👑 Drama</option>
            <option value="Mystery">🕵️ Mystery</option>
            <option value="Fantasy">✨ Fantasy</option>
        </select>

        <input type="text" id="poster" placeholder="Poster URL">
        <input type="text" id="banner" placeholder="Banner URL">
        
        <label style="display:block; margin: 10px 0;">
            <input type="checkbox" id="showBanner" style="width: auto;"> Show Banner
        </label>

        <textarea id="description" placeholder="Description"></textarea>
        <button id="publishBtn">Publish Drama</button>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
