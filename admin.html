<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>StoryByte Admin</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginBox" class="admin-box">

<h1>Admin Login</h1>

<input

id="email"

type="email"

placeholder="Email"

>

<input

id="password"

type="password"

placeholder="Password"

>

<button id="loginBtn">

Login

</button>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel" class="admin-box">

<h1>StoryByte Admin</h1>

<input

id="title"

placeholder="Drama Name">

<input

id="category"

placeholder="Category">

<input

id="poster"

placeholder="Poster URL">

<input

id="banner"

placeholder="Banner URL">

<input

id="video"

placeholder="Video URL">

<textarea

id="description"

placeholder="Description">

</textarea>

<label>

<input

type="checkbox"

id="trending">

Trending

</label>

<label>

<input

type="checkbox"

id="latest">

Latest Upload

</label>

<button id="publishBtn">

Publish Drama

</button>

</div>

<script

type="module"

src="js/admin.js">

</script>

</body>

</html>
