<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StoryByte Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div id="loginBox" class="panel">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>

    <div id="uploadPanel" class="panel" style="display:none;">
        <h3>Remote Upload</h3>
        <input type="text" id="manualVideoUrl" placeholder="Google Drive Link paste karein">
        <button id="uploadBtn">Start Remote Upload</button>
        
        <div id="uploadStatus" style="margin-top:10px; color:#ff9800;"></div>
        
        <input type="text" id="generatedLink" placeholder="Streamtape Link yahan generate hogi" readonly>
        
        <button id="nextBtn" style="background:#28a745;">Next (Publish Page)</button>
    </div>

    <div id="adminPanel" class="panel" style="display:none;">
        <input type="text" id="title" placeholder="Drama Title">
        <input type="text" id="category" placeholder="Category">
        <input type="text" id="poster" placeholder="Poster URL">
        <textarea id="description" placeholder="Description"></textarea>
        <button id="publishBtn">Publish Drama</button>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
